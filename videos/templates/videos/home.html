<!DOCTYPE html>
<html>
<head>
    <title>Kasai24 TV</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/174/174881.png" type="image/png">
    <style>
        body { font-family: Arial; background: #111; color: white; margin: 0; padding: 20px; }
        h1 { color: red; text-align: center; }
        .video { background: #222; padding: 15px; margin: 10px 0; border-radius: 8px; }
        a { color: red; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>🔴 KASAI24 TV</h1>
    {% for video in videos %}
    <div class="video">
        <h2>{{ video.titre }}</h2>
        <p>{{ video.description }}</p>
        <a href="{{ video.video_url }}" target="_blank">Regarder la vidéo</a>
    </div>
    {% empty %}
    <p>Aucune vidéo pour le moment.</p>
    {% endfor %}
</body>
</html>
